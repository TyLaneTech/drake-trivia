{% extends "base.html" %}
{% block title %}Host sign in — Drake Trivia{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='styles/login.css') }}">{% endblock %}

{% block content %}
<div class="login-shell">
    <div class="card login-card">
        <header class="login-head">
            <div class="login-logo-wrap">
                <img src="{{ url_for('static', filename='images/d-logo.png') }}" alt="" class="login-logo">
            </div>
            <h1 class="login-title">Host sign in</h1>
            <p class="login-tag" id="admin-tagline">Sign in to run the game.</p>
        </header>

        <div class="form-error" id="admin-error" hidden></div>

        <form id="admin-form" class="login-form">
            <label class="field">
                <span class="field-label">Username</span>
                <input type="text" id="admin-username" required autocomplete="username">
            </label>
            <label class="field">
                <span class="field-label">Password</span>
                <input type="password" id="admin-password" required autocomplete="current-password">
            </label>
            <button type="submit" class="btn btn-xl login-btn" id="admin-submit">Sign in</button>
        </form>

        <footer class="login-foot">
            <a href="{{ url_for('auth.login') }}">← Player sign in</a>
        </footer>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/admin_login.js') }}"></script>
{% endblock %}
