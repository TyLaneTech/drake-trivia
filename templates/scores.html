<!-- templates/scores.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drake Trivia - Scores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/scores.css') }}">
</head>
<body>
    <div class="container">
        <h1>Tournament Bracket</h1>

        <div class="tournament-bracket" id="bracket">
            <!-- Bracket will be populated dynamically -->
        </div>

        <div class="scoreboard">
            <h2>Live Scores</h2>
            <div class="scores-list" id="scores-list">
                <!-- Scores will be populated dynamically -->
            </div>
        </div>

        <div class="metrics">
            <h2>Team Metrics</h2>
            <div id="fastest-answers">Fastest Answers: <span>--</span></div>
            <div id="most-accurate">Most Accurate: <span>--</span></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script src="{{ url_for('static', filename='js/scores.js') }}"></script>
</body>
</html>
