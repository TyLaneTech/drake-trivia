<!-- templates/navbar.html -->

<!-- Hamburger menu button -->
<button id="sidebar-toggle" class="sidebar-toggle">
    <span class="hamburger"></span>
</button>

<!-- Sidebar content -->
<nav class="sidebar collapsed" id="sidebar">
    <div class="sidebar-header">
        <img src="{{ url_for('static', filename='images/d-logo.png') }}" alt="Drake Trivia Logo" class="sidebar-logo">
        <h2>Drake Trivia</h2>
    </div>

    <div class="sidebar-content">
        <ul class="nav-links">
            <li>
                <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>
                    <i class="nav-icon">🏠</i>
                    <span class="nav-text">Home</span>
                </a>
            </li>

            {% if session.get('team_name') %}
            <li>
                <a href="{{ url_for('questions') }}" {% if request.endpoint == 'questions' %}class="active"{% endif %}>
                    <i class="nav-icon">❓</i>
                    <span class="nav-text">Questions</span>
                </a>
            </li>
            {% endif %}

            <li>
                <a href="{{ url_for('scores') }}" {% if request.endpoint == 'scores' %}class="active"{% endif %}>
                    <i class="nav-icon">📊</i>
                    <span class="nav-text">Scores</span>
                </a>
            </li>

            {% if session.get('is_admin') %}
            <li>
                <a href="{{ url_for('admin') }}" {% if request.endpoint == 'admin' %}class="active"{% endif %}>
                    <i class="nav-icon">⚙️</i>
                    <span class="nav-text">Admin</span>
                </a>
            </li>
            {% endif %}
        </ul>
    </div>

    {% if session.get('team_name') %}
    <div class="sidebar-footer">
        <div class="team-info">
            <span class="team-label">Team:</span>
            <span class="team-name">{{ session.get('team_name') }}</span>
        </div>
        <a href="{{ url_for('logout') }}" class="logout-btn">
            <i class="nav-icon">🚪</i>
            <span class="nav-text">Logout</span>
        </a>
    </div>
    {% endif %}
</nav>
